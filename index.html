<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>
  <title>TOP: Sign-Up Form</title>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="logo">
        <img src="images/odin-lined.png" alt="Odin Project logo" class="odin-img">
        <h1 class="norse-text">ODIN</h1>
      </div>
      <p class="img-author">Photo by <a href="https://unsplash.com/@benkolde?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Ben Kolde</a>
        on <a href="https://unsplash.com/photos/Ajcipx1VDXI?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </p>
    </div>
    <div class="right">
      <div class="info-text">
        <p>
          This is not a real online service!  You know you need something like in your life to help you
          realize your deepest dreams.
        </p>
        <p>
          Sign up <em>now</em> to get started.
        </p>
        <p>
          You <em>know</em> you want to.
        </p>
      </div>
      <form action="#" class="form">
        <h3 class="form-caption span-2">Let's do this!</h3>
        <div class="form-item">
          <input type="text" name="first-name" id="first-name" required>
          <label for="first-name">First Name</label>
        </div>
        <div class="form-item">
          <input type="text" name="last-name" id="last-name" required>
          <label for="last-name">Last Name</label>
        </div>
        <div class="form-item">
          <input type="email" name="email" id="email" required>
          <label for="email">Email</label>
        </div>
        <div class="form-item">
          <input type="tel" name="phone-number" id="phone-number" required>
          <label for="phone-number">Phone Number</label>
        </div>
        <div class="form-item">
          <input type="password" name="password" id="password" required>
          <label for="password">Password</label>
        </div>
        <div class="form-item">
          <input type="password" name="confirm-password" id="confirm-password" required>
          <label for="confirm-password">Confirm Password</label>
        </div>
        <button class="btn">Create Account</button>
      </form>
      <div class="account-login">
        <p>Already have an account? <a href="#">Log in</a></p>
      </div>
    </div>
  </div>
</body>
</html>
